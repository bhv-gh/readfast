<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#1a1a1a"/>
  
  <!-- Document/Page -->
  <rect x="120" y="80" width="272" height="352" rx="16" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="4"/>
  
  <!-- Text lines (representing content) -->
  <rect x="150" y="120" width="180" height="12" rx="6" fill="#4a4a4a" opacity="0.6"/>
  <rect x="150" y="150" width="210" height="12" rx="6" fill="#4a4a4a" opacity="0.6"/>
  <rect x="150" y="180" width="160" height="12" rx="6" fill="#4a4a4a" opacity="0.4"/>
  
  <!-- Focus area - highlighted word -->
  <rect x="150" y="220" width="120" height="40" rx="8" fill="#3a3a3a"/>
  
  <!-- Word with anchor - "READ" with red A -->
  <text x="160" y="248" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff">RE</text>
  <text x="208" y="248" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ff4444">A</text>
  <text x="232" y="248" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff">D</text>
  
  <!-- More text lines -->
  <rect x="150" y="290" width="200" height="12" rx="6" fill="#4a4a4a" opacity="0.4"/>
  <rect x="150" y="320" width="170" height="12" rx="6" fill="#4a4a4a" opacity="0.3"/>
  
  <!-- Speed lines -->
  <g opacity="0.8">
    <path d="M 80 200 L 110 200" stroke="#4a9eff" stroke-width="6" stroke-linecap="round"/>
    <path d="M 80 240 L 110 240" stroke="#4a9eff" stroke-width="6" stroke-linecap="round"/>
    <path d="M 80 280 L 110 280" stroke="#4a9eff" stroke-width="6" stroke-linecap="round"/>
    
    <path d="M 402 200 L 432 200" stroke="#4a9eff" stroke-width="6" stroke-linecap="round"/>
    <path d="M 402 240 L 432 240" stroke="#4a9eff" stroke-width="6" stroke-linecap="round"/>
    <path d="M 402 280 L 432 280" stroke="#4a9eff" stroke-width="6" stroke-linecap="round"/>
  </g>
  
  <!-- Anchor line (vertical) -->
  <line x1="220" y1="220" x2="220" y2="260" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
</svg>
